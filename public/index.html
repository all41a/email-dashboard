<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Physician Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>Physician<strong>Dash</strong></span>
      </div>
      <div class="topbar-date" id="topbarDate"></div>
    </div>
  </header>

  <main id="view" class="view"></main>

  <nav class="tabbar" aria-label="Main navigation">
    <button class="tab active" data-tab="inbox">
      <span class="tab-icon">&#9993;</span><span class="tab-label">Inbox</span>
      <span class="tab-badge" id="inboxBadge" hidden></span>
    </button>
    <button class="tab" data-tab="calendar">
      <span class="tab-icon">&#128197;</span><span class="tab-label">Calendar</span>
    </button>
    <button class="tab" data-tab="finance">
      <span class="tab-icon">&#128176;</span><span class="tab-label">Finances</span>
    </button>
    <button class="tab" data-tab="availability">
      <span class="tab-icon">&#9200;</span><span class="tab-label">Shifts</span>
    </button>
  </nav>

  <div id="toast" class="toast" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
